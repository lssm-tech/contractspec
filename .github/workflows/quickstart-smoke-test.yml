name: Quickstart Smoke Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.10
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  build-smoke-packages:
    name: Build Smoke Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      BUN_INSTALL_CACHE_DIR: /tmp/contractspec-bun-install-cache
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packaged CLI
        run: bun turbo run build --filter="@contractspec/app.cli-contractspec"

      - name: Pack distributable CLI tarballs
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${{ runner.temp }}/smoke-tarballs"
          mkdir -p "$pack_dir"

          (
            cd packages/apps/cli-contractspec
            bun pm pack --destination "$pack_dir" --quiet
          )

          (
            cd packages/apps-registry/contractspec
            bun pm pack --destination "$pack_dir" --quiet
          )

          ls -1 "$pack_dir"

      - name: Upload smoke tarballs
        uses: actions/upload-artifact@v4
        with:
          name: smoke-cli-tarballs
          path: ${{ runner.temp }}/smoke-tarballs/*.tgz
          retention-days: 7

  contractspec-actions:
    name: ContractSpec Actions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUN_INSTALL_CACHE_DIR: /tmp/contractspec-bun-install-cache
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test ContractSpec Actions
        run: bun turbo run test --filter="@contractspec/action.pr" --filter="@contractspec/action.drift" --filter="@contractspec/action.validation"

  consumer-smoke:
    name: Consumer Smoke (${{ matrix.os }})
    needs: [build-smoke-packages]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      BUN_INSTALL_CACHE_DIR: /tmp/contractspec-bun-install-cache
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download smoke tarballs
        uses: actions/download-artifact@v4
        with:
          name: smoke-cli-tarballs
          path: ${{ runner.temp }}/smoke-tarballs

      - name: Verify packaged onboarding flows
        run: >
          node scripts/run-packaged-cli-smoke.mjs
          --tarball-dir "${{ runner.temp }}/smoke-tarballs"
          --output "${{ runner.temp }}/smoke-summary-${{ matrix.os }}.json"

      - name: Upload smoke summary
        uses: actions/upload-artifact@v4
        with:
          name: smoke-summary-${{ matrix.os }}
          path: ${{ runner.temp }}/smoke-summary-${{ matrix.os }}.json
          retention-days: 7
