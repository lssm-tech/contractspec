name: ContractSpec Dev CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  BUN_VERSION: 1.3.8
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: bun run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: bun run build

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run critical package tests
        run: >
          bun turbo run test
          --filter="@contractspec/app.cli-contractspec"
          --filter="@contractspec/module.workspace"
          --filter="@contractspec/module.ai-chat"
          --filter="@contractspec/lib.contracts-spec"
          --filter="@contractspec/lib.schema"
          --filter="@contractspec/lib.contracts-transformers"
          --filter="@contractspec/lib.testing"
          --filter="@contractspec/action.pr"
          --filter="@contractspec/action.drift"
          --filter="@contractspec/action.validation"

  validate-contracts:
    needs: [lint, build]
    name: Validate Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for impact detection

      - name: Run ContractSpec CI
        id: contractspec
        uses: ./packages/apps/action-validation
        with:
          mode: validate
          upload-sarif: true
          bun-version: '1.3.8'

      - name: Check validation result
        if: always()
        run: |
          echo "Success: ${{ steps.contractspec.outputs.success }}"
          echo "Errors: ${{ steps.contractspec.outputs.errors }}"
          echo "Warnings: ${{ steps.contractspec.outputs.warnings }}"

  validate-examples:
    needs: [lint, build]
    name: Validate Examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate example registry and package contracts
        run: bun run examples:validate

  impact-detection:
    name: Contract Impact Detection
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Contract Impact
        id: impact
        uses: ./packages/apps/action-validation
        with:
          mode: impact
          pr-comment: 'true'
          fail-on-breaking: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bun-version: '1.3.8'

      - name: Report Impact Status
        if: always()
        run: |
          echo "Impact Status: ${{ steps.impact.outputs.impact-status }}"
          echo "Breaking Changes: ${{ steps.impact.outputs.breaking-count }}"
          echo "Non-breaking Changes: ${{ steps.impact.outputs.non-breaking-count }}"
