    summary: Header and marketing header mobile menus now use AdaptivePanel instead of direct sheet composition, leaving sheet/drawer primitives behind the shared overlay adapter.
    affectedPackages:
      - "@contractspec/lib.design-system"
  - kind: integrator
    summary: Design-system overlay behavior is more consistent because mobile menu panels and object references share the AdaptivePanel boundary.
    affectedPackages:
      - "@contractspec/lib.design-system"
  - kind: customer
    summary: Mobile menus keep the same behavior while using the shared responsive panel implementation.
deprecations: []
migrationInstructions: []
upgradeSteps: []
validation:
  commands:
    - "cd packages/libs/design-system && bun run typecheck"
    - "cd packages/libs/design-system && bun run lint:check"
    - "cd packages/libs/design-system && bun run test"
    - "cd packages/libs/design-system && bun run build"
  evidence:
