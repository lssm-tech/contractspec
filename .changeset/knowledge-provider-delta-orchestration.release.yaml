schemaVersion: "1"
slug: knowledge-provider-delta-orchestration
summary: Add provider delta contracts, Google Drive knowledge ingestion, and governed mutation execution for workspace knowledge.
isBreaking: false
packages:
  - name: "@contractspec/lib.contracts-integrations"
    releaseType: minor
  - name: "@contractspec/lib.contracts-spec"
    releaseType: minor
  - name: "@contractspec/lib.knowledge"
    releaseType: minor
  - name: "@contractspec/bundle.library"
    releaseType: patch
  - name: "@contractspec/bundle.marketing"
    releaseType: patch
  - name: "@contractspec/app.web-landing"
    releaseType: patch
  - name: "@contractspec/example.knowledge-canon"
    releaseType: patch
affectedRuntimes:
  - bun
  - node
affectedFrameworks: []
audiences:
  - kind: maintainer
    summary: Maintainers get shared delta sync contracts and package-local tests for Gmail/Drive ingestion and governed mutations.
    affectedPackages:
      - "@contractspec/lib.contracts-integrations"
      - "@contractspec/lib.contracts-spec"
      - "@contractspec/lib.knowledge"
      - "@contractspec/bundle.library"
      - "@contractspec/app.web-landing"
  - kind: integrator
    summary: Integrators can model provider leases, cursors, webhook expiry, dedupe/idempotency, replay checkpoints, tombstones, Drive files, and governed outbound mutations before wiring runtime sync.
    affectedPackages:
      - "@contractspec/lib.contracts-integrations"
      - "@contractspec/lib.contracts-spec"
      - "@contractspec/lib.knowledge"
      - "@contractspec/bundle.library"
deprecations: []
migrationInstructions: []
upgradeSteps:
  - id: adopt-provider-delta-state
    title: Attach delta state before runtime sync
    summary: Use `ProviderDeltaSyncState` for provider cursors, leases, webhook expiry, dedupe, idempotency, replay, and tombstone state.
    level: manual
    instructions:
      - Pass provider cursor or watermark state into Gmail and Drive sync calls.
      - Persist returned delta state before acknowledging runtime sync work.
      - Skip or delete records marked with tombstones before re-indexing.
  - id: gate-external-knowledge-mutations
    title: Gate knowledge mutations before provider writes
    summary: Wrap external writes with `executeGovernedKnowledgeMutation(...)` so dry-runs, approvals, idempotency, audit evidence, and outbound-send gates are explicit.
    level: manual
    instructions:
      - Use `dryRun` for preview-only flows.
      - Provide `idempotencyKey` and `auditEvidence.evidenceRef` for non-dry-run mutations.
      - Require approval refs and an approved outbound-send gate before sending external messages.
validation:
  commands:
    - "bun test packages/libs/contracts-integrations/src/integrations/providers/provider-delta.test.ts packages/libs/contracts-integrations/src/integrations/providers/providers.test.ts"
    - "cd packages/libs/knowledge && bun run test && bun run typecheck && bun run lint:check"
    - "cd packages/libs/contracts-integrations && bun run typecheck && bun run lint:check"
    - "cd packages/libs/contracts-spec && bun run test src/knowledge/operations.test.ts && bun run typecheck && bun run lint:check"
    - "cd packages/bundles/library && bun run typecheck && bun run lint:check"
    - "cd packages/bundles/marketing && bun run typecheck && bun run lint:check"
    - "cd packages/apps/web-landing && bun run build:types && bun run lint:check"
    - "bun run docs:generate && bun run release:build"
    - "cd packages/apps/web-landing && bun run llms:generate"
    - "bun run release:check"
  evidence:
    - "`ProviderDeltaSyncState` models lease holder/expiry, renewal windows, cursors/watermark versions, webhook expiry, provider event IDs, dedupe/idempotency, replay checkpoints, and tombstones."
    - "`googleDriveIntegrationSpec` registers `storage.google-drive` with Drive ingestion and provider delta watch capabilities."
    - "`KnowledgeRuntime.syncGmail()`, `KnowledgeRuntime.syncDriveFiles()`, and `KnowledgeRuntime.watchDriveChanges()` load and save checkpoint deltas before acknowledging sync work."
    - "`knowledge.mutation.evaluateGovernance` exposes mutation governance as a ContractSpec operation for Connect, ops, and review packets."
    - "`executeGovernedKnowledgeMutation()` blocks missing evidence, preserves dry-runs, gates outbound sends behind approvals, and returns an audit envelope."
    - "Web docs include the provider-backed knowledge guide, Google Drive integration page, knowledge governance page, docblock entry, generated docs, release artifacts, and `/llms*` outputs."
