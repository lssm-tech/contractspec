schemaVersion: "1"
slug: byok-monorepo-env-config
summary: Add first-class monorepo-aware environment contracts and managed/BYOK credential setup helpers.
isBreaking: false
packages:
  - name: "@contractspec/lib.contracts-spec"
    releaseType: minor
  - name: "@contractspec/lib.contracts-integrations"
    releaseType: minor
  - name: "@contractspec/integration.runtime"
    releaseType: minor
  - name: "@contractspec/bundle.workspace"
    releaseType: minor
affectedRuntimes:
  - node
  - bun
affectedFrameworks:
  - next
  - expo
  - typescript
audiences:
  - kind: integrator
    summary: Monorepos can declare logical environment variables once and materialize framework-specific aliases such as NEXT_PUBLIC_* and EXPO_PUBLIC_* per app target.
    affectedPackages:
      - "@contractspec/lib.contracts-spec"
      - "@contractspec/bundle.workspace"
  - kind: maintainer
    summary: Integration specs can expose managed/BYOK credential manifests while runtime reports redact secret and sensitive values.
    affectedPackages:
      - "@contractspec/lib.contracts-integrations"
      - "@contractspec/integration.runtime"
  - kind: customer
    summary: BYOK setup can be validated from shared contracts without placing raw secrets in specs, docs, reports, or generated env examples.
deprecations: []
migrationInstructions: []
upgradeSteps:
  - id: adopt-logical-environment-definitions
    title: Declare logical env variables before framework aliases
    summary: Use workspace environment definitions and app targets instead of duplicating public env names across apps.
    level: assisted
    instructions:
      - Define shared logical variables under `.contractsrc.json > environment.variables`.
      - Add app targets for each package/framework that needs concrete aliases.
      - Keep secret values behind `secretRef` or environment/secret providers.
validation:
  commands:
    - "bun test packages/libs/contracts-spec/src/workspace-config/contractsrc-schema.test.ts"
    - "bun test packages/libs/contracts-integrations/src/integrations/credentials.test.ts"
    - "bun test packages/integrations/runtime/src/environment.test.ts"
    - "bun test packages/bundles/workspace/src/templates/environment.template.test.ts"
    - "cd packages/libs/contracts-spec && bun run typecheck"
    - "cd packages/libs/contracts-integrations && bun run typecheck"
    - "cd packages/integrations/runtime && bun run typecheck"
  evidence:
    - "Schema tests reject sensitive and secret values exposed through public Next/Expo aliases."
    - "Runtime tests prove alias materialization and redaction do not serialize secret values."
    - "Template tests split root and app-target env example output."
