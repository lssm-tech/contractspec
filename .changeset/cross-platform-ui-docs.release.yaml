schemaVersion: "1"
slug: cross-platform-ui-docs
summary: Add a dedicated cross-platform UI docs page and AGENTS/rules guidance that explain how the React, React Native, runtime, primitive UI, and design-system layers stay compatible.
isBreaking: false
packages:
  - name: "@contractspec/bundle.library"
    releaseType: patch
affectedRuntimes:
  - bun
  - node
  - nextjs
affectedFrameworks:
  - react
  - react-native
audiences:
  - kind: maintainer
    summary: Maintainers now have a dedicated website docs page, exported bundle-library docs component, and package/rule guidance for explaining the React and React Native UI layering model.
    affectedPackages:
      - "@contractspec/bundle.library"
  - kind: integrator
    summary: Integrators can follow one architecture-first explanation and matching agent guidance for when to use presentation-runtime-core, the React bindings, ui-kit-web, ui-kit, and the design-system layer.
    affectedPackages:
      - "@contractspec/bundle.library"
  - kind: customer
    summary: Website readers and AI-agent users now have a direct cross-platform UI guide instead of piecing the React and React Native compatibility story together from several separate library pages.
    affectedPackages:
      - "@contractspec/bundle.library"
deprecations: []
migrationInstructions: []
upgradeSteps: []
validation:
  commands:
    - "cd packages/bundles/library && bun test src/components/docs/docsManifest.test.ts && bun run typecheck && bun run lint:check"
    - "cd packages/bundles/marketing && bun run typecheck && bun run lint:check"
    - "cd packages/apps/web-landing && bun run build:types && bun run lint:check"
  evidence:
    - "`@contractspec/bundle.library` now exports `LibrariesCrossPlatformUIPage` and documents the package split between shared runtime models, web/native primitives, and the design-system layer."
    - "The central design-system/vibe-coding rules and relevant package AGENTS now point future agents at the same cross-surface compatibility policy."
    - "`@contractspec/app.web-landing` now serves `/docs/libraries/cross-platform-ui`, and related library docs link back to that shared architecture guide."
    - "`@contractspec/bundle.marketing` now registers the new docs presentation key `web-landing.docs.libraries.cross-platform-ui` for delivery surfaces that rely on the docs registry."
