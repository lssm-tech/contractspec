schemaVersion: "1"
slug: cli-onboard-guided-adoption
summary: Add a CLI-first onboarding workflow that reuses Connect adoption guidance, models guided onboarding through the surface runtime, generates managed AGENTS/USAGE guides, and exposes the same onboarding tracks through the CLI MCP surface and docs entrypoints.
isBreaking: false
packages:
  - name: "@contractspec/app.cli-contractspec"
    releaseType: minor
  - name: "@contractspec/bundle.workspace"
    releaseType: minor
  - name: "@contractspec/bundle.library"
    releaseType: minor
affectedRuntimes:
  - bun
  - node
  - mcp
affectedFrameworks:
  - commander
  - elysia
audiences:
  - kind: maintainer
    summary: Maintainers get a single onboarding catalog and planner that powers CLI output, managed repo guides, Connect-compatible evidence, and the CLI MCP onboarding resources.
    affectedPackages:
      - "@contractspec/app.cli-contractspec"
      - "@contractspec/bundle.workspace"
      - "@contractspec/bundle.library"
  - kind: integrator
    summary: Integrators can bootstrap OSS adoption with track-aware guidance for contracts, UI design, knowledge, AI agents, and learning journeys without inventing a second Builder or Connect model.
    affectedPackages:
      - "@contractspec/app.cli-contractspec"
      - "@contractspec/bundle.workspace"
      - "@contractspec/bundle.library"
  - kind: customer
    summary: CLI users can run `contractspec onboard` to generate repo-local AGENTS/USAGE guidance, get recommended examples and next commands, and query the same onboarding information through MCP.
    affectedPackages:
      - "@contractspec/app.cli-contractspec"
      - "@contractspec/bundle.library"
deprecations: []
migrationInstructions:
  - id: adopt-cli-onboard
    title: Use `contractspec onboard` as the primary OSS onboarding flow
    summary: The CLI now provides a first-class onboarding command that should replace ad hoc “quickstart + create one spec” repo bootstraps.
    required: false
    when: When documentation, scripts, or internal runbooks still point contributors directly to `contractspec create` as the first repo-local step.
    steps:
      - Run `contractspec onboard` at the repo root to generate or update the managed `AGENTS.md` and `USAGE.md` sections.
      - Use `contractspec onboard <track...>` to focus onboarding on one or more tracks such as `knowledge` or `ai-agents`.
      - Use `--example <key>` when you want the command to create a lightweight example stub under `.contractspec/examples/`.
  - id: expose-usage-guide-target
    title: Include the new `usage-md` setup target in setup automation
    summary: `contractspec init` can now create or merge a managed `USAGE.md` section in addition to `AGENTS.md`.
    required: false
    when: When custom setup wrappers or tests enumerate setup targets explicitly.
    steps:
      - Add `usage-md` anywhere setup target lists are pinned manually.
      - Treat `USAGE.md` as the human-facing repo onboarding document and `AGENTS.md` as the AI-operator document.
upgradeSteps:
  - id: connect-adoption-first
    title: Route onboarding through the existing Connect adoption layer
    summary: The onboarding flow now syncs and consults the existing adoption catalog before recommending new surfaces.
    level: assisted
    instructions:
      - Use `contractspec connect adoption sync` to refresh the local adoption catalog outside the onboarding command when needed.
      - Prefer `contractspec connect adoption resolve --family <family> --stdin` for custom tooling that needs the same reuse recommendations.
  - id: consume-mcp-onboarding
    title: Use CLI MCP onboarding resources instead of hardcoded prompts
    summary: The CLI MCP surface now exposes onboarding tracks, rendered artifacts, and next-command suggestions.
    level: manual
    instructions:
      - Read `onboarding://tracks` and `onboarding://track/{id}` for the canonical onboarding catalog.
      - Call `onboarding_suggestTracks`, `onboarding_renderArtifacts`, and `onboarding_nextCommand` for repo-specific planning and guide rendering.
validation:
  commands:
    - "cd packages/bundles/workspace && bun test src/services/onboarding/service.test.ts src/services/setup/setup-service.test.ts src/services/setup/targets/agents-md.test.ts src/services/setup/targets/usage-md.test.ts"
    - "cd packages/apps/cli-contractspec && bun test src/commands/onboard/index.test.ts src/program/create-program.test.ts src/commands/init/index.test.ts"
    - "cd packages/bundles/library && bun test src/application/mcp/cliMcp.test.ts"
  evidence:
    - "`@contractspec/bundle.workspace` now exports a shared onboarding service and `usage-md` setup target, and reuses Connect adoption resolution plus surface-runtime guided-mode planning."
    - "`@contractspec/app.cli-contractspec` now exposes `contractspec onboard`, updates quickstart guidance, and can emit Connect-backed onboarding artifacts and optional example stubs."
    - "`@contractspec/bundle.library` now exposes onboarding resources, prompts, and tools through the existing CLI MCP handler and updates getting-started docs to point users at the onboarding flow."
