schemaVersion: "1"
slug: forms-password-rendering
summary: Add password-aware FormSpec rendering with current/new password manager hints and visibility toggles.
isBreaking: false
packages:
  - name: "@contractspec/lib.contracts-spec"
    releaseType: minor
  - name: "@contractspec/lib.contracts-runtime-client-react"
    releaseType: minor
  - name: "@contractspec/lib.design-system"
    releaseType: minor
  - name: "@contractspec/lib.ui-kit-web"
    releaseType: minor
  - name: "@contractspec/lib.ui-kit"
    releaseType: minor
  - name: "@contractspec/lib.ui-kit-core"
    releaseType: patch
affectedRuntimes:
  - bun
  - browser
  - nextjs
  - expo
affectedFrameworks:
  - react
  - react-native
audiences:
  - kind: maintainer
    summary: Maintainers can declare current and new password fields as additive FormSpec text metadata.
    affectedPackages:
      - "@contractspec/lib.contracts-spec"
      - "@contractspec/lib.contracts-runtime-client-react"
  - kind: integrator
    summary: Integrators can render password fields through an optional driver slot while older drivers fall back to masked inputs.
    affectedPackages:
      - "@contractspec/lib.contracts-runtime-client-react"
      - "@contractspec/lib.design-system"
  - kind: customer
    summary: Contract-driven password forms now mask values, expose a visibility toggle, and provide password-manager autocomplete hints.
    affectedPackages:
      - "@contractspec/lib.design-system"
      - "@contractspec/lib.ui-kit-core"
deprecations: []
migrationInstructions:
  - id: existing-text-fields-compatible
    title: Keep existing text fields as-is
    summary: Existing text fields and custom driver slots remain compatible.
    required: false
    steps:
      - No migration is required for non-password text fields.
  - id: adopt-password-metadata
    title: Mark password fields explicitly
    summary: Prefer `text.password.purpose` for password fields instead of renderer-specific `uiProps.type`.
    required: false
    steps:
      - Use `password: { purpose: "current" }` for existing-password entry.
      - Use `password: { purpose: "new" }` for new-password creation or reset fields.
upgradeSteps:
  - id: add-password-driver-slot
    title: Add PasswordInput to custom drivers
    summary: Custom form renderers can provide the optional `PasswordInput` slot to get a visibility toggle.
    level: optional
    instructions:
      - Implement a driver component that accepts input props plus `passwordPurpose`, `visibilityToggle`, `showLabelI18n`, and `hideLabelI18n`.
      - Omit the slot to keep the fallback masked input behavior.
validation:
  commands:
    - "bun test packages/libs/contracts-spec/src/forms/forms.test.ts packages/libs/contracts-runtime-client-react/src/form-render.impl.test.tsx packages/libs/design-system/src/renderers/form-contract.test.tsx packages/libs/design-system/src/components/forms/controls/controls.test.tsx packages/libs/ui-kit-web/ui/input-password.test.tsx"
    - "cd packages/libs/contracts-spec && bun run typecheck && bun run lint:check"
    - "cd packages/libs/contracts-runtime-client-react && bun run typecheck && bun run lint:check"
    - "cd packages/libs/design-system && bun run typecheck && bun run lint:check && bun run test"
    - "cd packages/libs/ui-kit-web && bun run typecheck && bun run lint:check && bun run test"
    - "cd packages/libs/ui-kit && bun run typecheck && bun run lint:check"
  evidence:
    - "FormSpec text fields expose additive password metadata for current/new password purposes."
    - "React renderer detects explicit and legacy password hints and emits masked current/new autocomplete fields."
    - "Design-system, web UI kit, and native UI kit expose shared InputPassword controls with visibility toggles."
