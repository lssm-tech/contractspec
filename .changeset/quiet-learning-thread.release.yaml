schemaVersion: "1"
slug: quiet-learning-thread
summary: Redesign the learning system around the adaptive journey runtime and repair shared learning sandbox presentation wiring.
isBreaking: true
packages:
  - name: "@contractspec/module.learning-journey"
    releaseType: major
  - name: "@contractspec/module.examples"
    releaseType: patch
  - name: "@contractspec/example.learning-journey-ambient-coach"
    releaseType: major
  - name: "@contractspec/example.learning-journey-crm-onboarding"
    releaseType: major
  - name: "@contractspec/example.learning-journey-duo-drills"
    releaseType: major
  - name: "@contractspec/example.learning-journey-platform-tour"
    releaseType: major
  - name: "@contractspec/example.learning-journey-quest-challenges"
    releaseType: major
  - name: "@contractspec/example.learning-journey-registry"
    releaseType: major
  - name: "@contractspec/example.learning-journey-studio-onboarding"
    releaseType: major
  - name: "@contractspec/example.learning-journey-ui-coaching"
    releaseType: major
  - name: "@contractspec/example.learning-journey-ui-gamified"
    releaseType: major
  - name: "@contractspec/example.learning-journey-ui-onboarding"
    releaseType: major
  - name: "@contractspec/example.learning-journey-ui-shared"
    releaseType: major
  - name: "@contractspec/example.learning-patterns"
    releaseType: major
affectedRuntimes:
  - bun
  - node
  - nextjs
affectedFrameworks:
  - react
audiences:
  - kind: maintainer
    summary: The learning stack now uses the adaptive `learning.journey.*` runtime and the sandbox resolves shared learning registry presentations through `@contractspec/module.examples`.
    affectedPackages:
      - "@contractspec/module.learning-journey"
      - "@contractspec/module.examples"
      - "@contractspec/example.learning-journey-ambient-coach"
      - "@contractspec/example.learning-journey-crm-onboarding"
      - "@contractspec/example.learning-journey-duo-drills"
      - "@contractspec/example.learning-journey-platform-tour"
      - "@contractspec/example.learning-journey-quest-challenges"
      - "@contractspec/example.learning-journey-registry"
      - "@contractspec/example.learning-journey-studio-onboarding"
      - "@contractspec/example.learning-journey-ui-coaching"
      - "@contractspec/example.learning-journey-ui-gamified"
      - "@contractspec/example.learning-journey-ui-onboarding"
      - "@contractspec/example.learning-journey-ui-shared"
      - "@contractspec/example.learning-patterns"
  - kind: integrator
    summary: Integrators must adopt the new adaptive journey contracts/types and can rely on shared learning sandbox presentations resolving correctly for the supported `learning-journey-*` templates.
    affectedPackages:
      - "@contractspec/module.learning-journey"
      - "@contractspec/module.examples"
      - "@contractspec/example.learning-journey-registry"
      - "@contractspec/example.learning-journey-ui-shared"
      - "@contractspec/example.learning-patterns"
  - kind: customer
    summary: Learning journey demos now follow the adaptive branch-aware runtime, and the public sandbox no longer fails when loading the shared learning presentation descriptors for supported learning templates.
    affectedPackages:
      - "@contractspec/module.examples"
      - "@contractspec/example.learning-journey-registry"
deprecations: []
migrationInstructions:
  - id: migrate-to-learning-journey-runtime
    title: Move learning integrations to the adaptive journey runtime
    summary: Replace the old onboarding-centric learning contracts and local example progress logic with the canonical adaptive `learning.journey.*` runtime.
    required: true
    when: When consuming `@contractspec/module.learning-journey` contracts, track specs, or shared learning example progress helpers.
    steps:
      - Update contract references from `learning.onboarding.*` to `learning.journey.*`.
      - Replace old onboarding/progress type imports with the new adaptive journey types and projected progress snapshots.
      - Remove any local learning track evaluators or progress stores that duplicate the module runtime.
  - id: align-learning-sandbox-template-mappings
    title: Align learning template mappings with the shared learning registry
    summary: Use the shared learning registry mapping/data helpers so supported learning sandbox templates resolve the shared presentation set consistently.
    required: false
    when: When extending sandbox/template support for additional learning examples.
    steps:
      - Add the template to the learning registry template map and track lookup helpers.
      - Ensure the template’s presentation list uses the shared `learning.journey.*` keys only when the registry can provide matching data.
      - Register descriptor resolution and markdown rendering in `@contractspec/module.examples`.
upgradeSteps:
  - id: rebuild-learning-release-artifacts
    title: Rebuild learning package release artifacts after upgrading
    summary: The affected learning packages should be rebuilt and revalidated together because the runtime, examples, and sandbox wiring now depend on the same adaptive presentation/runtime surface.
    level: assisted
    instructions:
      - Run package-level build, test, typecheck, and lint checks for the affected learning packages.
      - Regenerate example registry artifacts if `@contractspec/module.examples` dependencies change.
      - Verify at least one supported learning sandbox route renders markdown successfully.
validation:
  commands:
    - cd packages/modules/learning-journey && bun run build && bun test && bun run typecheck && bun run lint:check
    - cd packages/examples/learning-journey-registry && bun run build && bun test && bun run typecheck && bun run lint:check
    - cd packages/modules/examples && bun run build && bun test && bun run typecheck && bun run lint:check
    - cd packages/examples/learning-patterns && bun run build && bun test && bun run typecheck && bun run lint:check
  evidence:
    - "The shared learning presentation keys resolve in `module.examples`, and markdown rendering succeeds for supported learning templates without the previous descriptor-not-found failure."
    - "`@contractspec/example.learning-journey-registry` owns the template-to-track mapping and shared learning markdown renderers instead of duplicating that logic in the sandbox runtime."
    - "The learning packages publish the adaptive journey runtime/types and branch-aware example tracks consistently across module/examples."
