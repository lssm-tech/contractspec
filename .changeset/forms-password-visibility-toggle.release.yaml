schemaVersion: "1"
slug: forms-password-visibility-toggle
summary: Fix FormSpec password visibility toggles so rendered password fields can reveal and re-mask values.
isBreaking: false
packages:
  - name: "@contractspec/lib.design-system"
    releaseType: patch
  - name: "@contractspec/lib.ui-kit-web"
    releaseType: patch
affectedRuntimes:
  - bun
  - browser
  - nextjs
affectedFrameworks:
  - react
audiences:
  - kind: maintainer
    summary: The web password primitive now keeps its computed `type` authoritative over upstream input props from FormSpec renderers.
    affectedPackages:
      - "@contractspec/lib.ui-kit-web"
  - kind: integrator
    summary: Design-system FormSpec renderers can pass legacy `type: "password"` hints without disabling the visibility toggle.
    affectedPackages:
      - "@contractspec/lib.design-system"
      - "@contractspec/lib.ui-kit-web"
  - kind: customer
    summary: Contract-driven password fields now reveal the password when the visibility toggle changes from closed eye to open eye.
    affectedPackages:
      - "@contractspec/lib.design-system"
deprecations: []
migrationInstructions: []
upgradeSteps: []
validation:
  commands:
    - "bun test packages/libs/ui-kit-web/ui/input-password.test.tsx"
    - "bun test packages/libs/design-system/src/renderers/form-contract.test.tsx"
    - "cd packages/libs/ui-kit-web && bun run typecheck && bun run lint:check"
    - "cd packages/libs/design-system && bun run typecheck && bun run lint:check && bun run test"
  evidence:
    - "InputPassword now spreads caller input props before applying the visibility-controlled `type` attribute."
    - "The focused ui-kit-web regression covers caller-supplied `type: \"password\"` while clicking the visibility toggle."
    - "The design-system FormSpec regression renders a password field through the form renderer, clicks the toggle, and verifies the DOM input changes to `text` and back to `password`."
knownGaps:
  - "`packages/libs/ui-kit-web` still has a pre-existing Jest package test runner gap for TSX parsing; the changed password path is covered by focused Bun tests plus typecheck and lint."
