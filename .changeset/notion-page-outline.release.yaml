schemaVersion: "1"
slug: notion-page-outline
summary: Improve PageOutline desktop behavior with a Notion-like floating rail that keeps AppShell content centered while expanding on hover or keyboard focus.
isBreaking: false
packages:
  - name: "@contractspec/lib.design-system"
    releaseType: patch
affectedRuntimes:
  - browser
  - react-native
affectedFrameworks:
  - react
  - react-native
audiences:
  - kind: integrator
    summary: AppShell consumers get a floating desktop PageOutline that no longer reserves a right content column, while mobile and native outline behavior remains menu-contained.
    affectedPackages:
      - "@contractspec/lib.design-system"
  - kind: maintainer
    summary: Design-system maintainers can opt PageOutline into a floating variant while preserving existing rail and compact variants.
    affectedPackages:
      - "@contractspec/lib.design-system"
deprecations: []
migrationInstructions: []
upgradeSteps:
  - id: adopt-floating-page-outline
    title: Use the floating PageOutline variant for wide desktop shells
    summary: AppShell now uses the floating outline automatically; direct PageOutline consumers can opt in with `variant="floating"`.
    level: optional
    instructions:
      - Use `variant="floating"` for direct web PageOutline usage that should reduce when inactive.
      - Keep `variant="rail"` or `variant="compact"` where a static inline outline is still preferred.
validation:
  commands:
    - "cd packages/libs/design-system && bun run test"
    - "cd packages/libs/design-system && bun run typecheck"
    - "cd packages/libs/design-system && bun run lint:check"
  evidence:
    - "PageOutline render coverage exercises floating, rail, compact, anchors, and active state."
    - "AppShell render coverage confirms page content no longer reserves the fixed right outline column."
    - "AppShell dialog coverage confirms small-screen outline rendering remains compact."
