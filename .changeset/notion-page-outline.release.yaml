schemaVersion: "1"
slug: notion-page-outline
summary: Improve PageOutline desktop behavior with a Notion-like floating rail, and hide the AppShell page outline on small web screens to preserve layout stability.
isBreaking: false
packages:
  - name: "@contractspec/lib.design-system"
    releaseType: patch
affectedRuntimes:
  - browser
  - react-native
affectedFrameworks:
  - react
  - react-native
audiences:
  - kind: integrator
    summary: AppShell consumers get a floating desktop PageOutline that no longer reserves a right content column, while small web screens hide the outline instead of rendering a compact dialog.
    affectedPackages:
      - "@contractspec/lib.design-system"
  - kind: maintainer
    summary: Design-system maintainers can opt PageOutline into a floating variant while preserving existing rail and compact variants for direct component usage.
    affectedPackages:
      - "@contractspec/lib.design-system"
deprecations: []
migrationInstructions: []
upgradeSteps:
  - id: adopt-floating-page-outline
    title: Use the floating PageOutline variant for wide desktop shells
    summary: AppShell now uses the floating outline automatically on wide desktop and hides it on smaller web layouts; direct PageOutline consumers can still opt in with `variant="floating"` or `variant="compact"`.
    level: optional
    instructions:
      - Use `variant="floating"` for direct web PageOutline usage that should reduce when inactive.
      - Keep `variant="rail"` or `variant="compact"` where a static inline outline is still preferred.
      - Place any custom small-screen outline UI outside AppShell if a product needs one.
validation:
  commands:
    - "cd packages/libs/design-system && bun run test"
    - "cd packages/libs/design-system && bun run typecheck"
    - "cd packages/libs/design-system && bun run lint:check"
  evidence:
    - "PageOutline render coverage exercises floating, rail, compact, anchors, and active state."
    - "AppShell render coverage confirms page content no longer reserves the fixed right outline column."
    - "AppShell coverage confirms the small-screen outline trigger and compact dialog path are not rendered."
