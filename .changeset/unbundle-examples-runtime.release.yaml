schemaVersion: "1"
slug: unbundle-examples-runtime
summary: Split example discovery from rich runtime packages so lightweight consumers no longer install every ContractSpec example.
isBreaking: true
packages:
  - name: "@contractspec/module.examples"
    releaseType: major
  - name: "@contractspec/app.cli-contractspec"
    releaseType: minor
  - name: "@contractspec/bundle.marketing"
    releaseType: patch
  - name: "@contractspec/bundle.library"
    releaseType: patch
affectedRuntimes:
  - bun
  - node
  - browser
affectedFrameworks:
  - react
  - nextjs
audiences:
  - kind: integrator
    summary: `@contractspec/module.examples` root imports now expose catalog metadata only; rich runtime helpers moved to `@contractspec/module.examples/runtime`.
    affectedPackages:
      - "@contractspec/module.examples"
      - "@contractspec/bundle.marketing"
      - "@contractspec/bundle.library"
  - kind: operator
    summary: CLI installs avoid the full example dependency set and can fetch a selected example source on demand with `contractspec examples download <key>`.
    affectedPackages:
      - "@contractspec/app.cli-contractspec"
migrationInstructions:
  - id: use-runtime-entrypoint-for-rich-examples
    title: Import rich example runtime helpers from the runtime subpath
    summary: Replace runtime imports such as `TemplateRuntimeProvider`, `listTemplates`, and inline preview loaders from `@contractspec/module.examples` with `@contractspec/module.examples/runtime`.
    affectedPackages:
      - "@contractspec/module.examples"
  - id: keep-catalog-consumers-on-catalog-entrypoint
    title: Use catalog imports for metadata-only example discovery
    summary: Import `listExamples`, `getExample`, `searchExamples`, route helpers, and source metadata from `@contractspec/module.examples/catalog` when runnable example code is not needed.
    affectedPackages:
      - "@contractspec/module.examples"
verification:
  - bun test packages/modules/examples/src/registry.test.ts packages/modules/examples/src/runtime/previews.test.ts
  - bun test packages/apps/cli-contractspec/src/commands/examples/index.test.ts packages/apps/cli-contractspec/src/commands/examples/download.test.ts packages/apps/cli-contractspec/src/commands/onboard/index.test.ts
  - cd packages/modules/examples && bun run typecheck && bun run lint:check
  - cd packages/apps/cli-contractspec && bun run typecheck && bun run build:node
knownGaps: []
