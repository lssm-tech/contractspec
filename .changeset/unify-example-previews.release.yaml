schemaVersion: "1"
slug: unify-example-previews
summary: Unify example preview metadata so templates and docs derive inline preview support from shared example registry data instead of hand-maintained lists.
isBreaking: false
packages:
  - name: "@contractspec/module.examples"
    releaseType: minor
  - name: "@contractspec/bundle.marketing"
    releaseType: patch
  - name: "@contractspec/bundle.library"
    releaseType: patch
  - name: "@contractspec/app.web-landing"
    releaseType: patch
  - name: "@contractspec/example.agent-console"
    releaseType: patch
  - name: "@contractspec/example.ai-chat-assistant"
    releaseType: patch
  - name: "@contractspec/example.analytics-dashboard"
    releaseType: patch
  - name: "@contractspec/example.crm-pipeline"
    releaseType: patch
  - name: "@contractspec/example.integration-hub"
    releaseType: patch
  - name: "@contractspec/example.learning-journey-registry"
    releaseType: patch
  - name: "@contractspec/example.marketplace"
    releaseType: patch
  - name: "@contractspec/example.policy-safe-knowledge-assistant"
    releaseType: patch
  - name: "@contractspec/example.saas-boilerplate"
    releaseType: patch
  - name: "@contractspec/example.workflow-system"
    releaseType: patch
affectedRuntimes:
  - bun
  - node
  - nextjs
affectedFrameworks:
  - react
audiences:
  - kind: maintainer
    summary: Preview wiring now comes from a generated example preview registry, and UI-backed example packages must expose `entrypoints.ui` in their exported `ExampleSpec`.
    affectedPackages:
      - "@contractspec/module.examples"
      - "@contractspec/bundle.marketing"
      - "@contractspec/bundle.library"
      - "@contractspec/app.web-landing"
      - "@contractspec/example.agent-console"
      - "@contractspec/example.ai-chat-assistant"
      - "@contractspec/example.analytics-dashboard"
      - "@contractspec/example.crm-pipeline"
      - "@contractspec/example.integration-hub"
      - "@contractspec/example.learning-journey-registry"
      - "@contractspec/example.marketplace"
      - "@contractspec/example.policy-safe-knowledge-assistant"
      - "@contractspec/example.saas-boilerplate"
      - "@contractspec/example.workflow-system"
  - kind: integrator
    summary: Integrators consuming public example metadata can now detect inline-preview capability through `@contractspec/module.examples`, and every public example now has a first-party `/docs/examples/<key>` route in web-landing.
    affectedPackages:
      - "@contractspec/module.examples"
      - "@contractspec/bundle.library"
      - "@contractspec/app.web-landing"
  - kind: customer
    summary: The public site now provides richer template previews and full docs-example coverage, with inline embeds for UI-backed examples and fallback sandbox/reference actions elsewhere.
    affectedPackages:
      - "@contractspec/bundle.marketing"
      - "@contractspec/app.web-landing"
deprecations: []
migrationInstructions:
  - id: declare-example-ui-entrypoint
    title: Declare `entrypoints.ui` for UI-backed example packages
    summary: Any published example that exports `./ui` should also advertise that UI surface in its `ExampleSpec` entrypoints so preview tooling can discover it.
    required: false
    when: When adding or updating a published example package with a reusable UI export.
    steps:
      - "Add `ui: './ui'` to the example's `entrypoints` object in `src/example.ts`."
      - "Update `scripts/generate-example-registry.ts` if the package needs a non-default preview component export."
      - "Regenerate the example registries before publishing."
upgradeSteps:
  - id: refresh-example-preview-registry
    title: Regenerate preview metadata after adding UI-backed examples
    summary: Keep the generated preview registry aligned with the workspace examples.
    level: assisted
    instructions:
      - Run `bun scripts/generate-example-registry.ts --write`.
      - Re-run preview tests in `packages/modules/examples`, `packages/bundles/marketing`, and `packages/bundles/library`.
      - Verify `/templates` and `/docs/examples/<key>` render the expected inline or fallback preview action.
validation:
  commands:
    - bun test packages/modules/examples/src/runtime/previews.test.ts packages/bundles/marketing/src/components/templates/template-preview.test.ts packages/bundles/library/src/components/docs/examples/exampleShowcaseData.test.ts packages/apps/web-landing/src/app/docs/examples/example-doc-routes.test.ts
    - cd packages/modules/examples && bun run typecheck && bun run lint:check
    - cd packages/bundles/marketing && bun run typecheck && bun run lint:check
    - cd packages/bundles/library && bun run typecheck && bun run lint:check
    - cd packages/apps/web-landing && bun run build:types && bun run lint:check
  evidence:
    - "`@contractspec/module.examples` now exports a generated inline preview registry plus helpers for public example docs and sandbox fallback URLs."
    - "`@contractspec/bundle.marketing` no longer maintains its own inline preview allowlist; it consumes the shared registry for `/templates`."
    - "`@contractspec/app.web-landing` now derives `/docs/examples/*` routes and sitemap entries from the public example registry instead of a curated hardcoded subset."
